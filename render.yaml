services:
  # Backend API Service
  - type: web
    name: worker-productivity-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        generateValue: true
    disk:
      name: backend-data
      mountPath: /opt/render/project/src/backend/data
      sizeGB: 1

  # Frontend Service
  - type: web
    name: worker-productivity-frontend
    env: static
    region: oregon
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /api/*
        destination: https://worker-productivity-backend.onrender.com/api/*
    envVars:
      - key: VITE_API_URL
        sync: false
